name: studyhub
description: A social learning app like Facebook mini.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter_skill: ^0.2.6
  flutter:
    sdk: flutter
  get_it: ^7.6.7
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  go_router: ^12.1.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2
  dio: ^5.4.0
  image_picker: ^1.0.7
  video_player: ^2.8.3
  cached_network_image: ^3.3.1
  timeago: ^3.6.1
  uuid: ^4.3.3
  intl: ^0.19.0
  cupertino_icons: ^1.0.6
  video_player_win: ^3.2.2
  dartz: ^0.10.1
  supabase_flutter: ^2.12.0
  share_plus: ^12.0.1
  flutter_facebook_auth: ^6.0.4
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.7
  bloc_test: ^9.1.5
  mocktail: ^1.0.3

dependency_overrides:
